  <!-- SCRIPTS -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const videos = document.querySelectorAll("video.lazy-video");

      // ✅ iPhone autoplay unlock (LIGHTWEIGHT FIX)
      let unlocked = false;

      function unlockVideos() {
        if (unlocked) return;

        const firstVideo = document.querySelector("video.lazy-video");

        if (firstVideo) {
          firstVideo.muted = true;
          firstVideo.setAttribute("playsinline", "");

          firstVideo.play()
            .then(() => firstVideo.pause())
            .catch(() => {});
        }

        unlocked = true;

        document.removeEventListener("touchstart", unlockVideos);
        document.removeEventListener("click", unlockVideos);
      }

      document.addEventListener("touchstart", unlockVideos, {
        passive: true
      });
      document.addEventListener("click", unlockVideos);

      // ✅ SMART VIDEO LOADING + PLAY
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target;
          const source = video.querySelector("source");

          if (entry.isIntersecting) {

            // Load only when needed
            if (source.dataset.src && !source.src) {
              source.src = source.dataset.src;
              video.load();
            }

            video.play().catch(() => {});
          } else {
            video.pause();
          }
        });
      }, {
        threshold: 0.6
      });

      videos.forEach(video => observer.observe(video));

    });
  </script>
