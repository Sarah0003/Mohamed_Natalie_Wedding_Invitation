<head>

<body>
  <!-- START SECTION 1 -->
  <section id="sec_1">
    <div class="container-fluid video-container">
      <div class="video-nav">
  

      </div>
      <div class="row video">

        <div class="col-sm-12 col-xl-12 sec_1_video position-relative">
          <video class="lazy-video" autoplay loop muted playsinline>
            <source src="Videos/home.mp4" type="video/mp4">
          </video>

          <div class="nav">
            <ul class="navbar-nav">
              <div class="navItems firstList">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="#">HOME</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#about">OUR STORY</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">DETAILS</a>

              </div>

              <div class="navItems middleList">
                <li class="nav-item navbar-brand-item">
                  <a class="navbar-brand nav-icon" href="#"><img src="images/nav_icon.png" alt="" /></a>
                </li>
              </div>

              <div class="navItems lastList">
                <li class="nav-item extra-link">

                <li class="nav-item">

    </div>
  </section>
  <!-- END SECTION 1 -->

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      let lazyVideos = document.querySelectorAll("video.lazy-video");

      lazyVideos.forEach(video => {
        // Force play the video
        video.play().catch(error => {
          console.log("Autoplay prevented:", error);
        });
      });

      let observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            let video = entry.target;
            let source = video.querySelector("source");
            if (source.dataset.src) {
              source.src = source.dataset.src;
              video.load();
              video.play().catch(error => {
                console.log("Autoplay prevented:", error);
              });
            }
            observer.unobserve(video);
          }
        });
      });

      lazyVideos.forEach(video => {
        observer.observe(video);
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
  </script>
</body>
